<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Clipboard body -->
  <rect x="136" y="128" width="240" height="280" rx="24" fill="rgba(255,255,255,0.13)"/>
  <!-- Clipboard top clip -->
  <rect x="200" y="108" width="112" height="40" rx="12" fill="rgba(255,255,255,0.2)"/>
  <!-- Task line 1 (checked) -->
  <circle cx="192" cy="212" r="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3.5"/>
  <path d="M183 212 L189 218 L201 206" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="222" y="204" width="120" height="14" rx="7" fill="rgba(255,255,255,0.3)"/>
  <!-- Task line 2 -->
  <circle cx="192" cy="264" r="14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3.5"/>
  <rect x="222" y="256" width="96" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <!-- Task line 3 -->
  <circle cx="192" cy="316" r="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3.5"/>
  <rect x="222" y="308" width="108" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
  <!-- Main checkmark - bold and prominent -->
  <path d="M168 310 L232 380 L372 210" fill="none" stroke="white" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
